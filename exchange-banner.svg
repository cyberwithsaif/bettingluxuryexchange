<svg viewBox="0 0 1920 480" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d0f15;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a0a0e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0507;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowRed" cx="20%" cy="30%">
      <stop offset="0%" style="stop-color:#a3122e;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1a0a0e;stop-opacity:0" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="480" fill="url(#bgGrad)"/>

  <!-- Glow overlay -->
  <circle cx="300" cy="100" r="400" fill="url(#glowRed)"/>
  <circle cx="1700" cy="450" r="350" fill="url(#glowRed)"/>

  <!-- Geometric accent pattern -->
  <g opacity="0.08" stroke="#f59e0b" stroke-width="2" fill="none">
    <circle cx="200" cy="200" r="150"/>
    <circle cx="200" cy="200" r="100"/>
    <circle cx="200" cy="200" r="50"/>
    <line x1="50" y1="200" x2="350" y2="200"/>
    <line x1="200" y1="50" x2="200" y2="350"/>
  </g>

  <g opacity="0.08" stroke="#f59e0b" stroke-width="2" fill="none">
    <circle cx="1750" cy="350" r="180"/>
    <circle cx="1750" cy="350" r="120"/>
    <circle cx="1750" cy="350" r="60"/>
    <line x1="1550" y1="350" x2="1950" y2="350"/>
    <line x1="1750" y1="150" x2="1750" y2="550"/>
  </g>

  <!-- Cricket bat accent (left side) -->
  <g opacity="0.12">
    <rect x="80" y="150" width="30" height="200" fill="#f59e0b" transform="rotate(-35 95 250)"/>
    <circle cx="120" cy="80" r="20" fill="#f59e0b"/>
  </g>

  <!-- Cricket ball accent (right side) -->
  <g opacity="0.12">
    <circle cx="1800" cy="120" r="35" fill="#f59e0b"/>
    <line x1="1765" y1="120" x2="1835" y2="120" stroke="#1a0a0e" stroke-width="3"/>
    <line x1="1780" y1="100" x2="1820" y2="140" stroke="#1a0a0e" stroke-width="2"/>
  </g>

  <!-- Main text -->
  <text x="960" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" text-anchor="middle" fill="#ffffff" letter-spacing="-2">
    BEST BETTING
  </text>
  <text x="960" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="900" text-anchor="middle" fill="#f59e0b" letter-spacing="-2">
    PLATFORM
  </text>

  <!-- Tagline -->
  <text x="960" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" text-anchor="middle" fill="#ffffff" opacity="0.9" letter-spacing="1">
    Live Cricket • Football • Tennis • Exchange Markets
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="440" width="1920" height="40" fill="url(#bgGrad)" opacity="0.5"/>
  <rect x="400" y="450" width="1120" height="20" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="300" cy="460" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="500" cy="458" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="1420" cy="462" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="1620" cy="460" r="4" fill="#f59e0b" opacity="0.8"/>
</svg>
