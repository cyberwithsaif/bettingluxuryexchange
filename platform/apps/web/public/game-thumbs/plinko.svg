<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2d1b6e"/>
      <stop offset="100%" stop-color="#0a0412"/>
    </radialGradient>
    <radialGradient id="ball" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff9999"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="slotRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="slotGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="slotYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0" y1="0.6" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0412" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0412" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="200" x2="300" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Peg board — 8 rows, triangle arrangement -->
  <!-- Row 1 (1 peg) -->
  <circle cx="150" cy="48" r="5" fill="#c8cfe8" filter="url(#glow)" opacity="0.9"/>

  <!-- Row 2 (2 pegs) -->
  <circle cx="120" cy="78" r="5" fill="#c8cfe8" opacity="0.85"/>
  <circle cx="180" cy="78" r="5" fill="#c8cfe8" opacity="0.85"/>

  <!-- Row 3 (3 pegs) -->
  <circle cx="90"  cy="108" r="5" fill="#c8cfe8" opacity="0.8"/>
  <circle cx="150" cy="108" r="5" fill="#c8cfe8" opacity="0.8"/>
  <circle cx="210" cy="108" r="5" fill="#c8cfe8" opacity="0.8"/>

  <!-- Row 4 (4 pegs) -->
  <circle cx="60"  cy="138" r="5" fill="#c8cfe8" opacity="0.75"/>
  <circle cx="120" cy="138" r="5" fill="#c8cfe8" opacity="0.75"/>
  <circle cx="180" cy="138" r="5" fill="#c8cfe8" opacity="0.75"/>
  <circle cx="240" cy="138" r="5" fill="#c8cfe8" opacity="0.75"/>

  <!-- Row 5 (5 pegs) -->
  <circle cx="30"  cy="168" r="5" fill="#c8cfe8" opacity="0.7"/>
  <circle cx="90"  cy="168" r="5" fill="#c8cfe8" opacity="0.7"/>
  <circle cx="150" cy="168" r="5" fill="#c8cfe8" opacity="0.7"/>
  <circle cx="210" cy="168" r="5" fill="#c8cfe8" opacity="0.7"/>
  <circle cx="270" cy="168" r="5" fill="#c8cfe8" opacity="0.7"/>

  <!-- Row 6 (6 pegs) -->
  <circle cx="15"  cy="198" r="4.5" fill="#c8cfe8" opacity="0.6"/>
  <circle cx="63"  cy="198" r="4.5" fill="#c8cfe8" opacity="0.6"/>
  <circle cx="111" cy="198" r="4.5" fill="#c8cfe8" opacity="0.6"/>
  <circle cx="159" cy="198" r="4.5" fill="#c8cfe8" opacity="0.6"/>
  <circle cx="207" cy="198" r="4.5" fill="#c8cfe8" opacity="0.6"/>
  <circle cx="255" cy="198" r="4.5" fill="#c8cfe8" opacity="0.6"/>

  <!-- Row 7 (7 pegs) -->
  <circle cx="15"  cy="225" r="4" fill="#c8cfe8" opacity="0.5"/>
  <circle cx="55"  cy="225" r="4" fill="#c8cfe8" opacity="0.5"/>
  <circle cx="95"  cy="225" r="4" fill="#c8cfe8" opacity="0.5"/>
  <circle cx="135" cy="225" r="4" fill="#c8cfe8" opacity="0.5"/>
  <circle cx="175" cy="225" r="4" fill="#c8cfe8" opacity="0.5"/>
  <circle cx="215" cy="225" r="4" fill="#c8cfe8" opacity="0.5"/>
  <circle cx="255" cy="225" r="4" fill="#c8cfe8" opacity="0.5"/>

  <!-- Ball trail -->
  <circle cx="150" cy="78"  r="3" fill="rgba(239,68,68,0.2)"/>
  <circle cx="180" cy="108" r="4" fill="rgba(239,68,68,0.3)"/>
  <circle cx="210" cy="138" r="5" fill="rgba(239,68,68,0.4)"/>
  <circle cx="240" cy="168" r="6" fill="rgba(239,68,68,0.5)"/>

  <!-- Ball -->
  <circle cx="240" cy="168" r="10" fill="url(#ball)" filter="url(#softglow)"/>
  <circle cx="236" cy="164" r="3" fill="rgba(255,255,255,0.4)"/>

  <!-- Slot bars at bottom -->
  <rect x="2"   y="250" width="36" height="44" rx="4" fill="url(#slotRed)"/>
  <rect x="40"  y="250" width="36" height="44" rx="4" fill="url(#slotYellow)"/>
  <rect x="78"  y="250" width="36" height="44" rx="4" fill="url(#slotGreen)"/>
  <rect x="116" y="250" width="36" height="44" rx="4" fill="url(#slotGreen)"/>
  <rect x="154" y="250" width="36" height="44" rx="4" fill="url(#slotGreen)"/>
  <rect x="192" y="250" width="36" height="44" rx="4" fill="url(#slotYellow)"/>
  <rect x="230" y="250" width="36" height="44" rx="4" fill="url(#slotRed)"/>

  <!-- Slot labels -->
  <text x="20"  y="278" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">88×</text>
  <text x="58"  y="278" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="black" text-anchor="middle">3×</text>
  <text x="96"  y="278" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">1.4×</text>
  <text x="134" y="278" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">1×</text>
  <text x="172" y="278" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">1.4×</text>
  <text x="210" y="278" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="black" text-anchor="middle">3×</text>
  <text x="248" y="278" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white" text-anchor="middle">88×</text>

  <!-- Bottom overlay for text area -->
  <rect width="300" height="400" fill="url(#overlay)"/>

  <!-- Bottom text area background -->
  <rect x="0" y="310" width="300" height="90" fill="rgba(10,4,18,0.85)"/>

  <!-- Decorative line -->
  <line x1="20" y1="316" x2="280" y2="316" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>

  <!-- Provably fair badge -->
  <rect x="90" y="322" width="120" height="16" rx="8" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.5)" stroke-width="1"/>
  <text x="150" y="334" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="rgba(167,139,250,0.9)" text-anchor="middle" letter-spacing="2">PROVABLY FAIR</text>

  <!-- Game name -->
  <text x="150" y="368" font-family="system-ui,sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">PLINKO</text>

  <!-- Tagline -->
  <text x="150" y="388" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="rgba(167,139,250,0.7)" text-anchor="middle" letter-spacing="1">Drop · Bounce · Win</text>
</svg>
