<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0f2a1e"/>
      <stop offset="100%" stop-color="#050e08"/>
    </radialGradient>
    <radialGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffcc"/>
      <stop offset="50%" stop-color="#0080ff"/>
      <stop offset="100%" stop-color="#00ffcc"/>
    </radialGradient>
    <filter id="gemglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bombglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="overlay" x1="0" y1="0.5" x2="0" y2="1">
      <stop offset="0%" stop-color="#050e08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050e08" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="tileDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f4553"/>
      <stop offset="100%" stop-color="#1a2c38"/>
    </linearGradient>
    <linearGradient id="tileRevealed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f212e"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <pattern id="dotgrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.8" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="300" height="400" fill="url(#dotgrid)"/>

  <!-- 5×5 Mine grid, centered, showing 4×4 visible area -->
  <!-- Grid starts at x=30, y=30, each cell=50px with 6px gap -->
  <!-- Cell size: 46px, gap: 6px, total per cell: 52px -->
  <!-- 4 cols × 52 = 208, start at (300-208)/2 = 46 -->

  <!-- Row 1 -->
  <!-- Revealed gem -->
  <rect x="25"  y="38" width="54" height="54" rx="8" fill="url(#tileRevealed)" stroke="rgba(0,255,200,0.15)" stroke-width="1"/>
  <polygon points="52,45 68,57 52,78 36,57" fill="url(#gemGrad)" opacity="0.9" filter="url(#gemglow)"/>

  <!-- Dark tile -->
  <rect x="85"  y="38" width="54" height="54" rx="8" fill="url(#tileDark)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Dark tile -->
  <rect x="145" y="38" width="54" height="54" rx="8" fill="url(#tileDark)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Revealed gem -->
  <rect x="205" y="38" width="54" height="54" rx="8" fill="url(#tileRevealed)" stroke="rgba(0,255,200,0.15)" stroke-width="1"/>
  <polygon points="232,45 248,57 232,78 216,57" fill="url(#gemGrad)" opacity="0.9" filter="url(#gemglow)"/>

  <!-- Row 2 -->
  <rect x="25"  y="98" width="54" height="54" rx="8" fill="url(#tileDark)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- BOMB revealed! -->
  <rect x="85"  y="98" width="54" height="54" rx="8" fill="#dc2626" stroke="rgba(255,80,80,0.4)" stroke-width="2"/>
  <text x="112" y="133" font-size="28" text-anchor="middle" dominant-baseline="middle" filter="url(#bombglow)">💣</text>

  <!-- Dark tile -->
  <rect x="145" y="98" width="54" height="54" rx="8" fill="url(#tileDark)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Revealed gem -->
  <rect x="205" y="98" width="54" height="54" rx="8" fill="url(#tileRevealed)" stroke="rgba(0,255,200,0.15)" stroke-width="1"/>
  <polygon points="232,105 248,117 232,138 216,117" fill="url(#gemGrad)" opacity="0.9" filter="url(#gemglow)"/>

  <!-- Row 3 -->
  <!-- Revealed gem -->
  <rect x="25"  y="158" width="54" height="54" rx="8" fill="url(#tileRevealed)" stroke="rgba(0,255,200,0.15)" stroke-width="1"/>
  <polygon points="52,165 68,177 52,198 36,177" fill="url(#gemGrad)" opacity="0.9" filter="url(#gemglow)"/>

  <!-- Dark tile -->
  <rect x="85"  y="158" width="54" height="54" rx="8" fill="url(#tileDark)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Dark tile -->
  <rect x="145" y="158" width="54" height="54" rx="8" fill="url(#tileDark)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Dark tile -->
  <rect x="205" y="158" width="54" height="54" rx="8" fill="url(#tileDark)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 4 (faded, partial) -->
  <rect x="25"  y="218" width="54" height="54" rx="8" fill="url(#tileDark)" opacity="0.5" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <rect x="85"  y="218" width="54" height="54" rx="8" fill="url(#tileDark)" opacity="0.5" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <rect x="145" y="218" width="54" height="54" rx="8" fill="url(#tileDark)" opacity="0.5" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <rect x="205" y="218" width="54" height="54" rx="8" fill="url(#tileDark)" opacity="0.5" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Bottom overlay -->
  <rect width="300" height="400" fill="url(#overlay)"/>

  <!-- Text area -->
  <rect x="0" y="305" width="300" height="95" fill="rgba(5,14,8,0.90)"/>
  <line x1="20" y1="311" x2="280" y2="311" stroke="rgba(0,231,1,0.3)" stroke-width="1"/>

  <!-- Provably fair badge -->
  <rect x="90" y="317" width="120" height="16" rx="8" fill="rgba(0,100,50,0.3)" stroke="rgba(0,231,1,0.4)" stroke-width="1"/>
  <text x="150" y="329" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="rgba(0,231,1,0.8)" text-anchor="middle" letter-spacing="2">PROVABLY FAIR</text>

  <!-- Game name -->
  <text x="150" y="362" font-family="system-ui,sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">MINES</text>

  <!-- Tagline -->
  <text x="150" y="383" font-family="system-ui,sans-serif" font-size="10" font-weight="500" fill="rgba(0,200,100,0.7)" text-anchor="middle" letter-spacing="1">Find gems, avoid bombs</text>
</svg>
