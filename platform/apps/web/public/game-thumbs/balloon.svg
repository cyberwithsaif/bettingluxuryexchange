<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#0c1628"/>
      <stop offset="100%" stop-color="#020408"/>
    </radialGradient>

    <!-- Main balloon gradient (red-orange) -->
    <radialGradient id="balloon1" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ff9966"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>

    <!-- Second balloon (blue) -->
    <radialGradient id="balloon2" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>

    <!-- Third balloon (yellow) -->
    <radialGradient id="balloon3" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>

    <!-- Multiplier glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="overlay" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#020408" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="1"/>
    </linearGradient>

    <!-- Graph line gradient -->
    <linearGradient id="graphLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>

  <!-- Stars scattered in background -->
  <circle cx="30"  cy="25"  r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="80"  cy="15"  r="0.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="140" cy="30"  r="1.2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="200" cy="12"  r="0.8" fill="rgba(255,255,255,0.3)"/>
  <circle cx="260" cy="20"  r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="270" cy="55"  r="0.8" fill="rgba(255,255,255,0.25)"/>
  <circle cx="20"  cy="70"  r="0.7" fill="rgba(255,255,255,0.3)"/>
  <circle cx="240" cy="80"  r="1" fill="rgba(255,255,255,0.35)"/>
  <circle cx="55"  cy="100" r="0.8" fill="rgba(255,255,255,0.2)"/>
  <circle cx="280" cy="130" r="0.7" fill="rgba(255,255,255,0.25)"/>

  <!-- Crash/Balloon chart graph lines (grid) -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="20" y1="50"  x2="280" y2="50"/>
    <line x1="20" y1="100" x2="280" y2="100"/>
    <line x1="20" y1="150" x2="280" y2="150"/>
    <line x1="20" y1="200" x2="280" y2="200"/>
    <line x1="70"  y1="20" x2="70"  y2="220"/>
    <line x1="140" y1="20" x2="140" y2="220"/>
    <line x1="210" y1="20" x2="210" y2="220"/>
    <line x1="280" y1="20" x2="280" y2="220"/>
  </g>

  <!-- Y-axis multiplier labels -->
  <text x="15" y="54"  font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="end">4×</text>
  <text x="15" y="104" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="end">3×</text>
  <text x="15" y="154" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="end">2×</text>
  <text x="15" y="204" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.3)" text-anchor="end">1×</text>

  <!-- Crash curve fill area -->
  <path d="M20,200 Q80,195 130,170 Q180,140 230,80 Q255,50 270,30 L270,220 L20,220 Z"
        fill="rgba(239,68,68,0.08)"/>

  <!-- Crash curve line -->
  <path d="M20,200 Q80,195 130,170 Q180,140 230,80 Q255,50 270,30"
        fill="none" stroke="url(#graphLine)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Balloon — main large one at curve tip -->
  <!-- Red/orange balloon body at (270,30) -->
  <ellipse cx="270" cy="28" rx="20" ry="24" fill="url(#balloon1)" filter="url(#glow)"/>
  <!-- Highlight on balloon -->
  <ellipse cx="263" cy="20" rx="6" ry="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Balloon knot -->
  <ellipse cx="270" cy="52" rx="3" ry="2" fill="#b91c1c"/>
  <!-- String -->
  <path d="M270,54 Q268,60 270,65" stroke="#b91c1c" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Small blue balloon (background, earlier in flight) -->
  <ellipse cx="195" cy="92" rx="14" ry="17" fill="url(#balloon2)" opacity="0.7"/>
  <ellipse cx="190" cy="85" rx="4" ry="5" fill="rgba(255,255,255,0.2)"/>
  <ellipse cx="195" cy="109" rx="2.5" ry="1.8" fill="#1e3a8a" opacity="0.7"/>
  <path d="M195,111 Q193,116 195,120" stroke="#1e3a8a" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Small yellow balloon (furthest back) -->
  <ellipse cx="120" cy="152" rx="11" ry="13" fill="url(#balloon3)" opacity="0.5"/>
  <ellipse cx="116" cy="147" rx="3" ry="4" fill="rgba(255,255,255,0.2)"/>

  <!-- Multiplier display — glowing text -->
  <text x="150" y="145" font-family="system-ui,sans-serif" font-size="48" font-weight="900"
        fill="#ef4444" text-anchor="middle" filter="url(#bigglow)" opacity="0.3">3.24×</text>
  <text x="150" y="145" font-family="system-ui,sans-serif" font-size="48" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.9">3.24×</text>

  <!-- "CASHED OUT" mini badge (simulating cashout) -->
  <rect x="85" y="155" width="130" height="22" rx="11" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.6)" stroke-width="1"/>
  <text x="150" y="170" font-family="system-ui,sans-serif" font-size="10" font-weight="700"
        fill="#22c55e" text-anchor="middle" letter-spacing="1.5">CASHED OUT!</text>

  <!-- Bottom overlay -->
  <rect width="300" height="400" fill="url(#overlay)"/>

  <!-- Text area -->
  <rect x="0" y="305" width="300" height="95" fill="rgba(2,4,8,0.92)"/>
  <line x1="20" y1="311" x2="280" y2="311" stroke="rgba(239,68,68,0.35)" stroke-width="1"/>

  <!-- Provably fair badge -->
  <rect x="90" y="317" width="120" height="16" rx="8" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="150" y="329" font-family="system-ui,sans-serif" font-size="8" font-weight="600"
        fill="rgba(239,68,68,0.9)" text-anchor="middle" letter-spacing="2">PROVABLY FAIR</text>

  <!-- Game name -->
  <text x="150" y="362" font-family="system-ui,sans-serif" font-size="28" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="3">BALLOON</text>

  <!-- Tagline -->
  <text x="150" y="383" font-family="system-ui,sans-serif" font-size="10" font-weight="500"
        fill="rgba(239,68,68,0.7)" text-anchor="middle" letter-spacing="1">Cash out before it pops!</text>
</svg>
