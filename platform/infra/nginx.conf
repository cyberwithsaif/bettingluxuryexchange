# Edge reverse proxy.
# - exch.example.com   → user web (Next.js port 3000)
# - admin.exch.example.com → admin panel (Next.js port 3001)
# - /api and /socket.io routed to NestJS API (port 4000), with WS upgrade
# Add `ssl_certificate` blocks when fronting via Certbot / Cloudflare origin certs.

map $http_upgrade $connection_upgrade { default upgrade; '' close; }

upstream api_upstream   { server api:4000; keepalive 32; }
upstream web_upstream   { server web:3000; keepalive 32; }
upstream admin_upstream { server admin:3001; keepalive 32; }

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 16m;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/x-font-ttf image/svg+xml;

  # Security headers (Cloudflare can layer more on top later)
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # API + websockets
  location /api/ {
    proxy_pass         http://api_upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass         http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        $connection_upgrade;
    proxy_set_header   Host              $host;
    proxy_read_timeout 3600s;
  }

  # Default: user web
  location / {
    proxy_pass         http://web_upstream;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name admin.* admin-*;

  location / {
    proxy_pass http://admin_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
