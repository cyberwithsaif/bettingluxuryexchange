version: "3.9"

# ============================================================
# Full local stack: postgres + redis + api + web + admin + nginx
# For Hostinger VPS KVM4: `docker compose up -d` is the deploy.
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exch_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-exch_platform}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-exch_redis_dev}", "--appendonly", "yes"]
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes:
      - redisdata:/data

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-exch}:${POSTGRES_PASSWORD:-exch_dev_password}@postgres:5432/${POSTGRES_DB:-exch_platform}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-exch_redis_dev}@redis:6379
      API_PORT: 4000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-please-change-32+chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-please-change-32+chars-2}
      BOOTSTRAP_SUPERADMIN_USERNAME: ${BOOTSTRAP_SUPERADMIN_USERNAME:-superadmin}
      BOOTSTRAP_SUPERADMIN_PASSWORD: ${BOOTSTRAP_SUPERADMIN_PASSWORD:-ChangeMe!Now2026}
      CRICKET_API_TOKEN: ${CRICKET_API_TOKEN:-ec471071441bb2ac538a0ff901abd249}
      CORS_ORIGINS: http://localhost,http://localhost:3000,http://localhost:3001
    ports: ["4000:4000"]
    command: ["sh", "-lc", "pnpm --filter @exch/api prisma:deploy && node apps/api/dist/main.js"]

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    depends_on: [api]
    environment:
      NEXT_PUBLIC_API_BASE: http://api:4000
      NEXT_PUBLIC_WS_BASE: ws://localhost:4000
    ports: ["3000:3000"]
    command: ["sh", "-lc", "node apps/web/.next/standalone/apps/web/server.js"]

  admin:
    build:
      context: ..
      dockerfile: infra/admin.Dockerfile
    depends_on: [api]
    environment:
      NEXT_PUBLIC_ADMIN_API_BASE: http://api:4000
    ports: ["3001:3001"]
    command: ["sh", "-lc", "node apps/admin/.next/standalone/apps/admin/server.js"]

  nginx:
    image: nginx:1.27-alpine
    depends_on: [api, web, admin]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  redisdata:
